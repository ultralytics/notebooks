name: Notebook Smoke Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC

jobs:
  notebooks:
    name: Notebook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics pytest "shapely>=2.0.0" "transformers==4.49.0"

      - name: Run notebook smoke tests
        run: |
          echo "CI event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running full suite including @slow notebook coverage"
            pytest tests/test_notebooks.py --maxfail=1 -p no:warnings
          else
            echo "Running fast notebook smoke tests only"
            pytest -m "not slow" tests/test_notebooks.py --maxfail=1 -p no:warnings
          fi
